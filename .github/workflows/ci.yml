name: CI

# ── 트리거 ─────────────────────────────────────────────────
on:
  push:
    branches:
      - main
      - develop
      - 'feat/**'
      - 'fix/**'
  pull_request:
    branches:
      - main
      - develop

# ── 권한 ───────────────────────────────────────────────────
permissions:
  contents: read
  checks: write      # 테스트 결과 PR 코멘트 표시용
  pull-requests: write

jobs:
  # ── Spring Boot 테스트 ──────────────────────────────────
  test:
    name: Spring Boot Tests (JDK 21)
    runs-on: ubuntu-latest

    steps:
      - name: 소스 체크아웃
        uses: actions/checkout@v4

      - name: JDK 21 설정
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: gradle   # ~/.gradle 캐시로 빌드 속도 향상

      - name: Gradle 실행 권한 부여
        run: chmod +x gradlew

      - name: QueryDSL Q클래스 생성
        run: ./gradlew compileJava --no-daemon
        env:
          SPRING_PROFILES_ACTIVE: test
          JWT_SECRET_KEY: ${{ secrets.JWT_SECRET_KEY || 'ci-test-jwt-secret-key-minimum-256-bits' }}
          GEMINI_API_KEY: ci-test-gemini-key
          KAKAO_CLIENT_ID: ci-test-kakao-id
          KAKAO_CLIENT_SECRET: ci-test-kakao-secret

      - name: 테스트 실행
        run: ./gradlew test --no-daemon
        env:
          SPRING_PROFILES_ACTIVE: test
          JWT_SECRET_KEY: ${{ secrets.JWT_SECRET_KEY || 'ci-test-jwt-secret-key-minimum-256-bits' }}
          GEMINI_API_KEY: ci-test-gemini-key
          KAKAO_CLIENT_ID: ci-test-kakao-id
          KAKAO_CLIENT_SECRET: ci-test-kakao-secret

      - name: 테스트 결과 PR 코멘트로 게시
        uses: EnricoMi/publish-unit-test-result-action@v2
        if: always()   # 테스트 실패해도 결과 업로드
        with:
          files: build/test-results/**/*.xml

      - name: 테스트 HTML 리포트 아티팩트 업로드
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-report
          path: build/reports/tests/test/
          retention-days: 7

  # ── Docker 빌드 검증 (PR 에만 실행) ───────────────────
  docker-build-check:
    name: Docker Build Check
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'

    steps:
      - name: 소스 체크아웃
        uses: actions/checkout@v4

      - name: Spring Boot Docker 이미지 빌드 검증
        run: docker build -t pbl2-spring:test .

      - name: FastAPI Docker 이미지 빌드 검증
        # best.pt 없어도 Dockerfile 자체의 이상 유무를 확인
        run: docker build -t pbl2-fastapi:test ./fastapi
