name: CD

# main 브랜치 push 시 실행 (PR merge 후)
# 브랜치 보호 규칙으로 CI 통과 필수 설정 권장
on:
  push:
    branches:
      - main

# 최소 권한 원칙
permissions:
  contents: read

jobs:
  # ── Docker 이미지 빌드 & Docker Hub Push ─────────────────
  build-and-push:
    name: Docker Build & Push
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: write   # GHA 캐시(cache-to: type=gha) 쓰기에 필요

    steps:
      - name: 소스 체크아웃
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false

      - name: Docker Hub 로그인
        uses: docker/login-action@9780b0c442fbb1117ed29e0efdff1e18412f7567 # v3.3.0
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Docker Buildx 설정
        uses: docker/setup-buildx-action@f95db51fddba0c2d1ec667646a06c2ce06100226 # v3.1.0

      - name: Spring 이미지 빌드 & Push
        uses: docker/build-push-action@4f58ea79222b3b9dc2c8bbdd6debcef730109a75 # v5.4.0
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/pbl2-spring:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/pbl2-spring:${{ github.sha }}
          cache-from: type=gha,scope=spring
          cache-to: type=gha,scope=spring,mode=max

      - name: FastAPI 이미지 빌드 & Push
        uses: docker/build-push-action@4f58ea79222b3b9dc2c8bbdd6debcef730109a75 # v5.4.0
        with:
          context: ./fastapi
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/pbl2-fastapi:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/pbl2-fastapi:${{ github.sha }}
          cache-from: type=gha,scope=fastapi
          cache-to: type=gha,scope=fastapi,mode=max

  # ── 서버 배포 (SSH) ───────────────────────────────────────
  deploy:
    name: 서버 배포
    runs-on: ubuntu-latest
    needs: build-and-push
    permissions:
      contents: read

    steps:
      - name: 소스 체크아웃
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false

      - name: 설정 파일 서버 전송
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASSWORD }}
          port: ${{ secrets.SERVER_PORT }}
          source: "docker-compose.prod.yml,nginx/templates/default.conf.template,init-letsencrypt.sh"
          target: ~/pbl2/

      - name: 서버 배포 실행
        uses: appleboy/ssh-action@v1.0.3
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
          IMAGE_TAG: ${{ github.sha }}
          JWT_SECRET_KEY: ${{ secrets.JWT_SECRET_KEY }}
          KAKAO_CLIENT_ID: ${{ secrets.KAKAO_CLIENT_ID }}
          KAKAO_CLIENT_SECRET: ${{ secrets.KAKAO_CLIENT_SECRET }}
          KAKAO_REDIRECT_URI: ${{ secrets.KAKAO_REDIRECT_URI }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          DOMAIN: ${{ secrets.DOMAIN }}
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASSWORD }}
          port: ${{ secrets.SERVER_PORT }}
          envs: DOCKERHUB_USERNAME,DOCKERHUB_TOKEN,IMAGE_TAG,JWT_SECRET_KEY,KAKAO_CLIENT_ID,KAKAO_CLIENT_SECRET,KAKAO_REDIRECT_URI,GEMINI_API_KEY,DOMAIN
          script: |
            set -e
            mkdir -p ~/pbl2
            cd ~/pbl2

            # best.pt 파일 검증 (없으면 Docker가 디렉토리로 만들어 FastAPI 실패)
            if [ -d ./best.pt ]; then
              echo "ERROR: best.pt가 디렉토리입니다. 삭제 후 파일을 업로드하세요."
              rm -rf ./best.pt
              exit 1
            fi
            if [ ! -f ./best.pt ]; then
              echo "ERROR: best.pt 파일이 없습니다. 아래 명령으로 업로드하세요."
              echo "  scp -P ${SERVER_PORT} best.pt ${SERVER_USER}@${SERVER_HOST}:~/pbl2/best.pt"
              exit 1
            fi

            # .env 파일 갱신
            cat > .env <<EOF
            DOCKERHUB_USERNAME=${DOCKERHUB_USERNAME}
            JWT_SECRET_KEY=${JWT_SECRET_KEY}
            KAKAO_CLIENT_ID=${KAKAO_CLIENT_ID}
            KAKAO_CLIENT_SECRET=${KAKAO_CLIENT_SECRET}
            KAKAO_REDIRECT_URI=${KAKAO_REDIRECT_URI}
            GEMINI_API_KEY=${GEMINI_API_KEY}
            DOMAIN=${DOMAIN}
            EOF

            # Docker Hub 로그인
            echo "${DOCKERHUB_TOKEN}" | docker login -u "${DOCKERHUB_USERNAME}" --password-stdin

            # SHA 태그로 고정하여 Pull (latest race condition 방지)
            docker pull ${DOCKERHUB_USERNAME}/pbl2-spring:${IMAGE_TAG}
            docker pull ${DOCKERHUB_USERNAME}/pbl2-fastapi:${IMAGE_TAG}

            # compose가 바라보는 태그를 sha로 고정
            export SPRING_IMAGE="${DOCKERHUB_USERNAME}/pbl2-spring:${IMAGE_TAG}"
            export FASTAPI_IMAGE="${DOCKERHUB_USERNAME}/pbl2-fastapi:${IMAGE_TAG}"

            # 기존 컨테이너 중지 후 재시작 (MySQL 볼륨은 유지)
            SPRING_IMAGE=${SPRING_IMAGE} FASTAPI_IMAGE=${FASTAPI_IMAGE} \
              docker compose -f docker-compose.prod.yml down --remove-orphans
            SPRING_IMAGE=${SPRING_IMAGE} FASTAPI_IMAGE=${FASTAPI_IMAGE} \
              docker compose -f docker-compose.prod.yml up -d

            # 사용하지 않는 구 이미지 정리
            docker image prune -f