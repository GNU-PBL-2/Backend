services:
  mysql:
    image: mysql:8.0
    tty: true
    container_name: pbl2-mysql
    environment:
      MYSQL_ROOT_PASSWORD: rootpbl2pass
      MYSQL_DATABASE: pbl2
      MYSQL_USER: pbl2
      MYSQL_PASSWORD: pbl2pass
      TZ: Asia/Seoul
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-prootpbl2pass"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - pbl2-network
    restart: unless-stopped

  fastapi:
    image: ${FASTAPI_IMAGE}
    container_name: pbl2-fastapi
    environment:
      GEMINI_API_KEY: ${GEMINI_API_KEY}
    volumes:
      - ./best.pt:/app/best.pt:ro
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/docs')"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 120s
    networks:
      - pbl2-network
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    container_name: pbl2-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - ./certbot/conf:/etc/letsencrypt:ro
      - ./certbot/www:/var/www/certbot:ro
    depends_on:
      - spring
    networks:
      - pbl2-network
    restart: unless-stopped

  certbot:
    image: certbot/certbot
    container_name: pbl2-certbot
    volumes:
      - ./certbot/conf:/etc/letsencrypt
      - ./certbot/www:/var/www/certbot
    networks:
      - pbl2-network

  spring:
    image: ${SPRING_IMAGE}
    container_name: pbl2-spring
    expose:
      - "8080"
    environment:
      SPRING_PROFILES_ACTIVE: prod
      DB_URL: jdbc:mysql://pbl2-mysql:3306/pbl2?serverTimezone=Asia/Seoul&characterEncoding=UTF-8
      DB_USERNAME: pbl2
      DB_PASSWORD: pbl2pass
      JWT_SECRET_KEY: ${JWT_SECRET_KEY}
      KAKAO_CLIENT_ID: ${KAKAO_CLIENT_ID}
      KAKAO_CLIENT_SECRET: ${KAKAO_CLIENT_SECRET}
      KAKAO_REDIRECT_URI: ${KAKAO_REDIRECT_URI}
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      FASTAPI_BASE_URL: http://pbl2-fastapi:8000
    depends_on:
      mysql:
        condition: service_healthy
      fastapi:
        condition: service_healthy
    networks:
      - pbl2-network
    restart: unless-stopped

networks:
  pbl2-network:
    driver: bridge

volumes:
  mysql_data:
